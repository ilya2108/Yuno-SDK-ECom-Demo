<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>YUNIQUE — Thank you</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="nav">
    <div class="brand">YUNIQUE</div>
  </header>
  <main class="container narrow center">
    <h1>Thank you.</h1>
    <p id="msg" class="muted">Your order is confirmed.</p>
    <a class="btn" href="/">Continue shopping</a>
  </main>
  <script>
    const p = new URLSearchParams(location.search);
    const id = p.get('id'), status = p.get('status');
    if (id || status) {
      document.getElementById('msg').textContent =
        `Payment ${status || ''}${id ? ` · #${id.slice(0,8)}` : ''}`;
    }
  </script>
</body>
</html>
